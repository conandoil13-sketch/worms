<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Rogue: Retro Art Legacy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --mac-beige: #e5e0d8;
            --mac-dark: #2c2c2c;
            --stranger-red: #ff0000;
            --stranger-cyan: #00f2ff;
        }

        body {
            font-family: 'VT323', monospace;
            background-color: #0d0221;
            color: #fff;
            overflow-x: hidden;
        }

        /* 메인 게임 캔버스 스타일 */
        canvas {
            image-rendering: pixelated;
            border: 6px solid var(--mac-beige);
            background-color: #000;
        }

        /* 80년대 CRT 모니터 주사선 및 노이즈 효과 */
        .crt-overlay {
            position: relative;
            overflow: hidden;
        }

        .crt-overlay::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            z-index: 10;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            opacity: 0.5;
        }

        /* 미세한 화면 떨림 애니메이션 */
        @keyframes flicker {
            0% {
                opacity: 0.98;
            }

            5% {
                opacity: 0.95;
            }

            10% {
                opacity: 0.99;
            }

            100% {
                opacity: 1;
            }
        }

        .flicker {
            animation: flicker 0.15s infinite;
        }

        .gallery-item {
            position: absolute;
            transition: transform 0.1s linear;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.4));
            pointer-events: auto;
            cursor: pointer;
        }

        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: var(--stranger-red);
        }

        .retro-button {
            box-shadow: 4px 4px 0px var(--mac-dark);
            transition: all 0.1s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .retro-button:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--mac-dark);
        }

        .fixed-panel {
            height: 320px;
            overflow-y: auto;
            border-radius: 4px;
        }

        /* 커스텀 모달 스타일 */
        #customModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center select-none">

    <!-- 상단 내비게이션 -->
    <nav class="w-full max-w-[1400px] flex justify-between items-center p-6 z-50">
        <div class="flex items-center gap-3">
            <div
                class="w-10 h-10 bg-red-600 rounded-sm shadow-[0_0_20px_rgba(255,0,0,0.6)] flex items-center justify-center font-bold text-black text-2xl">
                S</div>
            <h1 class="text-4xl font-bold text-white tracking-widest italic"
                style="text-shadow: 2px 2px 0px #ff0000, -2px -2px 0px #00f2ff;">SNAKE LEGACY</h1>
        </div>
        <div class="flex gap-4">
            <button id="viewGameBtn"
                class="retro-button px-6 py-2 bg-[#f3e5ab] text-black font-bold border-2 border-black hover:bg-white transition text-xl">CONSOLE</button>
            <button id="viewGalleryBtn"
                class="retro-button px-6 py-2 bg-[#ff0000] text-white font-bold border-2 border-black hover:bg-red-500 transition text-xl">GALLERY</button>
        </div>
    </nav>

    <!-- 게임 뷰 영역 -->
    <main id="gameView" class="w-full max-w-[1400px] grid grid-cols-1 xl:grid-cols-4 gap-8 p-6 fade-in">
        <div
            class="xl:col-span-3 flex flex-col items-center justify-center relative bg-black/50 rounded-lg border-4 border-white/5 p-4 min-h-[620px] crt-overlay">
            <div id="canvasContainer" class="relative flicker">
                <canvas id="gameCanvas" class="shadow-[0_0_50px_rgba(0,0,0,0.8)]"></canvas>

                <!-- 시작 화면 (반투명 적용) -->
                <div id="startOverlay"
                    class="absolute inset-0 flex flex-col items-center justify-center bg-[#0d0221]/70 z-10 transition-opacity duration-500">
                    <div class="text-[#00f2ff] text-7xl font-black mb-4 italic tracking-widest animate-pulse"
                        style="text-shadow: 4px 4px 0px #ff0000;">INSERT COIN</div>
                    <p class="text-[#e5e0d8] text-2xl mb-12 tracking-widest uppercase font-bold">Press any arrow key to
                        begin</p>
                    <div
                        class="flex gap-12 text-red-500 text-xl font-bold uppercase tracking-[0.3em] bg-black/40 p-4 rounded-lg">
                        <span>[Arrows] Control</span>
                        <span>[Space] Turbo</span>
                    </div>
                </div>

                <!-- 결과 화면 -->
                <div id="resultOverlay"
                    class="hidden absolute inset-0 flex flex-col items-center justify-center bg-black/98 z-20 p-10 fade-in border-8 border-[#f3e5ab]">
                    <h2 class="text-[#00f2ff] text-5xl font-black mb-8 uppercase tracking-tighter italic"
                        style="text-shadow: 3px 3px 0px #ff0000;">Signal Captured</h2>
                    <div id="artPreviewContainer"
                        class="w-80 h-80 rounded-sm shadow-[0_0_60px_rgba(0,242,255,0.2)] overflow-hidden mb-10 border-4 border-[#f3e5ab] bg-black">
                    </div>
                    <div class="flex gap-6">
                        <button id="saveArtBtn"
                            class="retro-button bg-[#00f2ff] text-black px-10 py-4 font-black text-2xl border-2 border-black">SAVE
                            LOG</button>
                        <button id="retryBtn"
                            class="retro-button bg-red-600 text-white px-10 py-4 font-black text-2xl border-2 border-black">REBOOT</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 사이드바 -->
        <div class="flex flex-col gap-6">
            <div class="bg-black/70 p-6 rounded-lg border-2 border-[#f3e5ab]/20 shadow-xl">
                <h2
                    class="text-2xl font-black mb-4 text-[#00f2ff] uppercase tracking-widest border-b-2 border-[#00f2ff]/30 pb-2 italic">
                    Rankings</h2>
                <div id="scoreBoard" class="fixed-panel space-y-3 custom-scroll p-1"></div>
            </div>
            <div class="bg-black/70 p-6 rounded-lg border-2 border-[#f3e5ab]/20 shadow-xl flex-1 flex flex-col">
                <h2
                    class="text-2xl font-black mb-4 text-red-500 uppercase tracking-widest border-b-2 border-red-500/30 pb-2 italic">
                    System Output</h2>
                <div id="logDisplay"
                    class="fixed-panel custom-scroll text-lg text-emerald-400 font-mono tracking-tighter leading-tight p-2">
                </div>
            </div>
        </div>
    </main>

    <!-- 갤러리 뷰 -->
    <main id="galleryView" class="hidden fixed inset-0 bg-[#e5e0d8] z-[100] fade-in overflow-hidden crt-overlay">
        <div class="absolute top-8 left-8 z-[110] flex gap-4">
            <button id="backToGameBtn"
                class="retro-button bg-black text-white px-8 py-3 font-bold border-2 border-white text-xl">← EXIT
                CONSOLE</button>
            <button id="clearGalleryBtn"
                class="retro-button bg-white text-red-600 border-2 border-black px-8 py-3 font-bold text-xl">WIPE
                DATA</button>
        </div>
        <div id="floatingGallery" class="relative w-full h-full flicker"></div>
        <div id="emptyGalleryMsg"
            class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
            <p class="text-black/10 text-8xl font-black italic uppercase tracking-tighter">Memory Empty</p>
        </div>
    </main>

    <!-- 커스텀 모달 (Alert/Confirm 대체) -->
    <div id="customModal">
        <div class="bg-black border-4 border-[#f3e5ab] p-8 max-w-sm w-full text-center">
            <h3 id="modalTitle" class="text-2xl font-bold mb-4 text-[#00f2ff] italic uppercase tracking-widest">System
                Message</h3>
            <p id="modalText" class="text-xl mb-8 text-[#e5e0d8]"></p>
            <div id="modalButtons" class="flex justify-center gap-4">
                <!-- 버튼 동적 삽입 -->
            </div>
        </div>
    </div>

    <script>
        /** 레트로 사운드 엔진 **/
        const AudioEngine = {
            ctx: null,
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            playEat() {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(523.25, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1046.50, this.ctx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.1);
            },
            playDie() {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(30, this.ctx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.12, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.3);
            }
        };

        const TILE_SIZE = 16;
        const GRID_WIDTH = 60;
        const GRID_HEIGHT = 40;
        const BOT_COUNT = 3;
        const APPLE_COUNT = 15;
        const BASE_NORMAL_TICK = 160;
        const BASE_BOOST_TICK = 80;

        // 적 뱀 색상 리스트 (노랑 계열 제외)
        const BOT_COLORS = ["#ff0000", "#ff00ff", "#9d00ff", "#39ff14", "#ff4500", "#8b5cf6", "#ff1493"];

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = GRID_WIDTH * TILE_SIZE;
        canvas.height = GRID_HEIGHT * TILE_SIZE;

        const scoreBoard = document.getElementById('scoreBoard');
        const logDisplay = document.getElementById('logDisplay');
        const startOverlay = document.getElementById('startOverlay');
        const resultOverlay = document.getElementById('resultOverlay');
        const artPreviewContainer = document.getElementById('artPreviewContainer');

        let gameLogs = [];
        let startTime = 0;
        let lastGeneratedArt = null;

        /** UI 제어 유틸리티 **/
        const UI = {
            showModal(title, text, isConfirm, onConfirm) {
                const modal = document.getElementById('customModal');
                const titleEl = document.getElementById('modalTitle');
                const textEl = document.getElementById('modalText');
                const btnsEl = document.getElementById('modalButtons');

                titleEl.textContent = title;
                textEl.textContent = text;
                btnsEl.innerHTML = '';

                if (isConfirm) {
                    const yesBtn = document.createElement('button');
                    yesBtn.className = "retro-button bg-red-600 text-white px-6 py-2 border-2 border-black";
                    yesBtn.textContent = "PROCEED";
                    yesBtn.onclick = () => { modal.style.display = 'none'; onConfirm(); };

                    const noBtn = document.createElement('button');
                    noBtn.className = "retro-button bg-[#f3e5ab] text-black px-6 py-2 border-2 border-black";
                    noBtn.textContent = "CANCEL";
                    noBtn.onclick = () => { modal.style.display = 'none'; };

                    btnsEl.appendChild(yesBtn);
                    btnsEl.appendChild(noBtn);
                } else {
                    const okBtn = document.createElement('button');
                    okBtn.className = "retro-button bg-[#00f2ff] text-black px-8 py-2 border-2 border-black";
                    okBtn.textContent = "ACKNOWLEDGED";
                    okBtn.onclick = () => { modal.style.display = 'none'; };
                    btnsEl.appendChild(okBtn);
                }
                modal.style.display = 'flex';
            }
        };

        function generateHexFromTime(time) {
            const seed = Math.sin(time) * 10000;
            const r = Math.floor((seed - Math.floor(seed)) * 256);
            const g = Math.floor(((seed * 1.5) - Math.floor(seed * 1.5)) * 256);
            const b = Math.floor(((seed * 2.0) - Math.floor(seed * 2.0)) * 256);
            return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
        }

        function createGenerativeArt(startCol, endCol, length, score, time) {
            const artCanvas = document.createElement('canvas');
            artCanvas.width = 512; artCanvas.height = 512;
            const actx = artCanvas.getContext('2d');
            const complexity = Math.min(Math.floor(length / 2) + 5, 50);
            actx.translate(256, 256);
            const rotationSeed = score * 0.002;
            const baseWeight = Math.max(1.5, length / 10);
            const weightVariance = Math.max(2, score / 60);

            for (let i = 0; i < complexity; i++) {
                actx.rotate(rotationSeed + (Math.PI * 2 / complexity));
                actx.beginPath();
                actx.lineWidth = baseWeight + (i % weightVariance);
                actx.strokeStyle = i % 2 === 0 ? startCol : endCol;
                actx.globalAlpha = 0.6;
                const r = 30 + (i * (210 / complexity));
                const sides = 3 + (Math.floor(score / 35) % 6);
                for (let j = 0; j <= sides; j++) {
                    const angle = (j / sides) * Math.PI * 2;
                    const x = r * Math.cos(angle);
                    const y = r * Math.sin(angle);
                    if (j === 0) actx.moveTo(x, y); else actx.lineTo(x, y);
                }
                actx.stroke();
                if (i % 6 === 0) {
                    actx.fillStyle = i % 2 === 0 ? "#00f2ff" : "#ff0000";
                    actx.beginPath(); actx.arc(r * 0.75, r * 0.1, actx.lineWidth * 1.5, 0, Math.PI * 2); actx.fill();
                }
            }
            return artCanvas.toDataURL('image/png');
        }

        function getDist(a, b) { return Math.abs(a.x - b.x) + Math.abs(a.y - b.y); }

        function logEvent(type, detail) {
            const entry = { timestamp: Date.now(), type, ...detail };
            gameLogs.push(entry);
            const line = document.createElement('div');
            line.className = "mb-1 border-l-2 border-[#00f2ff]/30 pl-2 opacity-80 transition-opacity";
            line.textContent = `[${type}] ${JSON.stringify(detail)}`;
            logDisplay.prepend(line);
            if (logDisplay.childNodes.length > 40) logDisplay.removeChild(logDisplay.lastChild);
        }

        class SnakeGame {
            constructor() { this.init(); }
            init() {
                this.obstacles = new Set();
                this.apples = [];
                this.snakes = [];
                this.started = false;
                this.gameOver = false;
                this.globalTick = 0;
                this.lastTempoLevel = 0;
                gameLogs = [];
                logDisplay.innerHTML = "";
                startOverlay.style.opacity = "1";
                startOverlay.style.display = "flex";
                resultOverlay.style.display = "none";
                this.buildDungeon();
                this.spawnPlayers();
                for (let i = 0; i < APPLE_COUNT; i++) this.spawnApple();
                logEvent("SYSTEM", { msg: "CORE INITIALIZED" });
            }

            getCurrentIntervals() {
                const scoreLevel = Math.floor(this.player.score / 100);
                if (scoreLevel > this.lastTempoLevel) {
                    this.lastTempoLevel = scoreLevel;
                    logEvent("LEVEL UP", { tempo: "Increased", level: scoreLevel });
                }
                const reduction = scoreLevel * 10;
                return {
                    normal: Math.max(100, BASE_NORMAL_TICK - reduction),
                    boost: Math.max(50, BASE_BOOST_TICK - (reduction / 2))
                };
            }

            buildDungeon() {
                const floor = new Set();
                const rooms = [];
                for (let i = 0; i < 15; i++) {
                    const w = 5 + Math.random() * 8, h = 5 + Math.random() * 8;
                    const x = 2 + Math.random() * (GRID_WIDTH - w - 4), y = 2 + Math.random() * (GRID_HEIGHT - h - 4);
                    rooms.push({ x, y, w, h, cx: Math.floor(x + w / 2), cy: Math.floor(y + h / 2) });
                    for (let iy = Math.floor(y); iy < y + h; iy++) for (let ix = Math.floor(x); ix < x + w; ix++) floor.add(`${ix},${iy}`);
                }
                for (let i = 0; i < rooms.length - 1; i++) {
                    let a = rooms[i], b = rooms[i + 1];
                    for (let ix = Math.min(a.cx, b.cx); ix <= Math.max(a.cx, b.cx); ix++) { floor.add(`${ix},${a.cy}`); floor.add(`${ix},${a.cy + 1}`); }
                    for (let iy = Math.min(a.cy, b.cy); iy <= Math.max(a.cy, b.cy); iy++) { floor.add(`${b.cx},${iy}`); floor.add(`${b.cx + 1},${iy}`); }
                }
                for (let y = 0; y < GRID_HEIGHT; y++) for (let x = 0; x < GRID_WIDTH; x++) if (!floor.has(`${x},${y}`)) this.obstacles.add(`${x},${y}`);
                this.rooms = rooms;
            }

            spawnPlayers() {
                const r = this.rooms[0];
                this.player = {
                    id: "YOU", body: [{ x: r.cx, y: r.cy }], prevBody: [{ x: r.cx, y: r.cy }],
                    dir: { x: 0, y: 0 }, nextDir: { x: 0, y: 0 }, color: "#00f2ff", score: 0,
                    isBot: false, isDead: false, isBoosting: false, lastMove: 0
                };
                this.snakes.push(this.player);
                for (let i = 0; i < BOT_COUNT; i++) this.spawnBot(i + 1);
            }

            spawnBot(id) {
                const aliveCount = this.snakes.filter(s => s.isBot && !s.isDead).length;
                if (aliveCount >= BOT_COUNT) return;
                const r = this.rooms[Math.floor(Math.random() * this.rooms.length)];

                const dirs = [{ x: 1, y: 0 }, { x: -1, y: 0 }, { x: 0, y: 1 }, { x: 0, y: -1 }];
                const initialDir = dirs[Math.floor(Math.random() * 4)];

                // 무작위 색상 선택 (노랑 계열 제외)
                const randomColor = BOT_COLORS[Math.floor(Math.random() * BOT_COLORS.length)];

                this.snakes.push({
                    id: `BOT_#${id}`, body: [{ x: r.cx, y: r.cy }], prevBody: [{ x: r.cx, y: r.cy }],
                    dir: initialDir, color: randomColor, score: 0,
                    isBot: true, isDead: false, isBoosting: false, lastMove: 0, path: []
                });
            }

            spawnApple(xPos = -1, yPos = -1) {
                let x, y;
                if (xPos !== -1 && yPos !== -1) { x = xPos; y = yPos; }
                else {
                    let attempts = 0;
                    do {
                        x = Math.floor(Math.random() * GRID_WIDTH); y = Math.floor(Math.random() * GRID_HEIGHT);
                        attempts++; if (attempts > 100) return;
                    } while (this.hasAppleAt(x, y) || this.obstacles.has(`${x},${y}`) || this.snakes.some(s => s.body.some(b => b.x === x && b.y === y)));
                }
                if (!this.hasAppleAt(x, y)) this.apples.push({ x, y });
            }

            hasAppleAt(x, y) { return this.apples.some(a => a.x === x && a.y === y); }

            update(now) {
                if (this.gameOver || !this.started) return;
                this.globalTick++;

                const currentRates = this.getCurrentIntervals();

                this.snakes.forEach(s => {
                    const interval = s.isBoosting ? currentRates.boost : currentRates.normal;
                    if (now - s.lastMove >= interval) {
                        this.moveSnake(s);
                        s.lastMove = now;
                    }
                });
            }

            moveSnake(s) {
                if (s.isDead) return;
                s.prevBody = s.body.map(p => ({ ...p }));
                if (s.isBot) this.logicBot(s); else s.dir = s.nextDir;

                if (s.dir.x === 0 && s.dir.y === 0) return;

                const next = { x: s.body[0].x + s.dir.x, y: s.body[0].y + s.dir.y };
                if (this.isColliding(next, s)) { this.kill(s); return; }

                s.body.unshift(next);
                const appleIdx = this.apples.findIndex(a => a.x === next.x && a.y === next.y);
                if (appleIdx !== -1) {
                    s.score += 15; this.apples.splice(appleIdx, 1); this.spawnApple();
                    if (!s.isBot) AudioEngine.playEat();
                } else s.body.pop();

                if (s.isBoosting && s.body.length > 3 && this.globalTick % 5 === 0) {
                    const dropped = s.body.pop(); this.spawnApple(dropped.x, dropped.y);
                }
            }

            logicBot(bot) {
                if (this.globalTick % 6 === 0 || !bot.path || bot.path.length === 0) {
                    if (this.apples.length > 0) {
                        const target = this.apples.reduce((p, c) => getDist(bot.body[0], c) < getDist(bot.body[0], p) ? c : p, this.apples[0]);
                        bot.path = this.findPath(bot.body[0], target);
                    }
                }

                if (bot.path && bot.path.length > 0) {
                    const n = bot.path.shift();
                    bot.dir = { x: n.x - bot.body[0].x, y: n.y - bot.body[0].y };
                } else {
                    const dirs = [{ x: 1, y: 0 }, { x: -1, y: 0 }, { x: 0, y: 1 }, { x: 0, y: -1 }].sort(() => Math.random() - 0.5);
                    for (let d of dirs) {
                        const check = { x: bot.body[0].x + d.x, y: bot.body[0].y + d.y };
                        if (!this.isColliding(check, bot)) { bot.dir = d; break; }
                    }
                }
            }

            findPath(start, target) {
                const open = [start], cameFrom = new Map(), g = new Map(), f = new Map();
                const key = p => `${p.x},${p.y}`;
                g.set(key(start), 0); f.set(key(start), getDist(start, target));
                let iters = 0;
                while (open.length > 0 && iters < 250) {
                    iters++;
                    let curr = open.reduce((a, b) => (f.get(key(a)) || 0) < (f.get(key(b)) || 0) ? a : b);
                    if (curr.x === target.x && curr.y === target.y) {
                        const path = [];
                        while (cameFrom.has(key(curr))) { path.push(curr); curr = cameFrom.get(key(curr)); }
                        return path.reverse();
                    }
                    open.splice(open.indexOf(curr), 1);
                    [{ x: 1, y: 0 }, { x: -1, y: 0 }, { x: 0, y: 1 }, { x: 0, y: -1 }].forEach(d => {
                        const n = { x: curr.x + d.x, y: curr.y + d.y };
                        const nKey = key(n);
                        if (n.x < 0 || n.x >= GRID_WIDTH || n.y < 0 || n.y >= GRID_HEIGHT || this.obstacles.has(nKey)) return;
                        if (this.snakes.some(s => !s.isDead && s.body.some(b => b.x === n.x && b.y === n.y))) return;
                        const tg = g.get(key(curr)) + 1;
                        if (!g.has(nKey) || tg < g.get(nKey)) { cameFrom.set(nKey, curr); g.set(nKey, tg); f.set(nKey, tg + getDist(n, target)); if (!open.some(p => p.x === n.x && p.y === n.y)) open.push(n); }
                    });
                }
                return null;
            }

            isColliding(p, s) {
                if (p.x < 0 || p.x >= GRID_WIDTH || p.y < 0 || p.y >= GRID_HEIGHT || this.obstacles.has(`${p.x},${p.y}`)) return true;
                return this.snakes.some(sn => !sn.isDead && sn.body.some(b => b.x === p.x && b.y === p.y));
            }

            kill(s) {
                if (s.isDead) return;
                s.isDead = true;
                AudioEngine.playDie();
                s.body.forEach((p, i) => { if (i % 2 === 0) this.spawnApple(p.x, p.y); });
                logEvent("UNIT_LOST", { id: s.id, finalScore: s.score });
                if (s.id === "YOU") this.handleGameOver();
                else setTimeout(() => { this.snakes = this.snakes.filter(sn => sn !== s); if (!this.gameOver) this.spawnBot(Math.floor(Math.random() * 1000)); }, 2500);
            }

            handleGameOver() {
                this.gameOver = true;
                const endTime = performance.now();
                lastGeneratedArt = createGenerativeArt(generateHexFromTime(startTime), generateHexFromTime(endTime), this.player.body.length, this.player.score, endTime - startTime);
                artPreviewContainer.innerHTML = `<img src="${lastGeneratedArt}" class="w-full h-full object-contain">`;
                resultOverlay.style.display = "flex";
            }

            draw(now) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.05)";
                ctx.lineWidth = 1;
                for (let i = 0; i < GRID_WIDTH; i += 10) { ctx.beginPath(); ctx.moveTo(i * TILE_SIZE, 0); ctx.lineTo(i * TILE_SIZE, canvas.height); ctx.stroke(); }
                for (let i = 0; i < GRID_HEIGHT; i += 10) { ctx.beginPath(); ctx.moveTo(0, i * TILE_SIZE); ctx.lineTo(canvas.width, i * TILE_SIZE); ctx.stroke(); }
                ctx.fillStyle = "#222";
                this.obstacles.forEach(k => { const [x, y] = k.split(',').map(Number); ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE); });
                this.apples.forEach(a => {
                    ctx.shadowBlur = 15; ctx.shadowColor = "#fbbf24"; ctx.fillStyle = "#fbbf24";
                    ctx.beginPath(); ctx.arc(a.x * TILE_SIZE + TILE_SIZE / 2, a.y * TILE_SIZE + TILE_SIZE / 2, TILE_SIZE / 3, 0, Math.PI * 2); ctx.fill();
                });
                ctx.shadowBlur = 0;

                const currentRates = this.getCurrentIntervals();
                this.snakes.forEach(s => {
                    if (s.isDead) return;
                    const interval = s.isBoosting ? currentRates.boost : currentRates.normal;
                    const lerp = Math.min((now - s.lastMove) / interval, 1.0);
                    ctx.shadowBlur = s.isBoosting ? 20 : 10; ctx.shadowColor = s.color; ctx.fillStyle = s.color;
                    s.body.forEach((curr, i) => {
                        const prev = s.prevBody[i] || curr;
                        const dx = (prev.x + (curr.x - prev.x) * (this.started ? lerp : 0)) * TILE_SIZE;
                        const dy = (prev.y + (curr.y - prev.y) * (this.started ? lerp : 0)) * TILE_SIZE;
                        ctx.beginPath(); ctx.roundRect(dx + 1, dy + 1, TILE_SIZE - 2, TILE_SIZE - 2, i === 0 ? 6 : 4); ctx.fill();
                    });
                    ctx.shadowBlur = 0;
                });
            }
        }

        const STORAGE_KEY = 'snake_legacy_gallery_retro_v2';
        function saveArtToLocal() {
            if (!lastGeneratedArt) return;
            const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            saved.push({ id: Date.now(), data: lastGeneratedArt });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
            resultOverlay.style.display = "none";
            UI.showModal("ARCHIVED", "데이터 유산이 성공적으로 보관되었습니다.", false);
            resetGame();
        }

        const floatingItems = [];
        function fetchGallery() {
            const gallery = document.getElementById('floatingGallery');
            gallery.innerHTML = ""; floatingItems.length = 0;
            const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            document.getElementById('emptyGalleryMsg').style.display = saved.length ? "none" : "flex";
            saved.forEach(item => {
                const div = document.createElement('div');
                div.className = "gallery-item";
                div.innerHTML = `<img src="${item.data}" class="w-52 h-52">`;
                gallery.appendChild(div);
                floatingItems.push({
                    el: div, x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight,
                    vx: (Math.random() - 0.5) * 1.2, vy: (Math.random() - 0.5) * 1.2, rot: Math.random() * 360, vr: (Math.random() - 0.5) * 0.2
                });
            });
        }

        function updateGallery() {
            if (document.getElementById('galleryView').classList.contains('hidden')) return;
            floatingItems.forEach(item => {
                item.x += item.vx; item.y += item.vy; item.rot += item.vr;
                if (item.x < -100 || item.x > window.innerWidth + 100) item.vx *= -1;
                if (item.y < -100 || item.y > window.innerHeight + 100) item.vy *= -1;
                item.el.style.transform = `translate(${item.x}px, ${item.y}px) rotate(${item.rot}deg)`;
            });
            requestAnimationFrame(updateGallery);
        }

        let game = new SnakeGame();
        function resetGame() { game = new SnakeGame(); }

        window.addEventListener('keydown', e => {
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)) e.preventDefault();
            const p = game.player;
            if (e.key === ' ' && !game.gameOver) { if (p.body.length > 3) p.isBoosting = true; }
            let dirSet = false;
            if (e.key === 'ArrowUp' && p.dir.y === 0) { p.nextDir = { x: 0, y: -1 }; dirSet = true; }
            if (e.key === 'ArrowDown' && p.dir.y === 0) { p.nextDir = { x: 0, y: 1 }; dirSet = true; }
            if (e.key === 'ArrowLeft' && p.dir.x === 0) { p.nextDir = { x: -1, y: 0 }; dirSet = true; }
            if (e.key === 'ArrowRight' && p.dir.x === 0) { p.nextDir = { x: 1, y: 0 }; dirSet = true; }
            if (dirSet && !game.started) { AudioEngine.init(); game.started = true; startTime = performance.now(); startOverlay.style.opacity = "0"; setTimeout(() => startOverlay.style.display = "none", 500); }
        });
        window.addEventListener('keyup', e => { if (e.key === ' ') game.player.isBoosting = false; });

        document.getElementById('viewGalleryBtn').onclick = () => { document.getElementById('galleryView').classList.remove('hidden'); fetchGallery(); updateGallery(); };
        document.getElementById('backToGameBtn').onclick = () => document.getElementById('galleryView').classList.add('hidden');
        document.getElementById('clearGalleryBtn').onclick = () => { UI.showModal("DANGER", "정말 모든 로그를 삭제하시겠습니까?", true, () => { localStorage.removeItem(STORAGE_KEY); fetchGallery(); }); };
        document.getElementById('saveArtBtn').onclick = saveArtToLocal;
        document.getElementById('retryBtn').onclick = resetGame;
        document.getElementById('viewGameBtn').onclick = () => document.getElementById('galleryView').classList.add('hidden');

        function animate(now) {
            game.update(now);
            game.draw(now);
            const sorted = [...game.snakes].filter(s => !s.isDead).sort((a, b) => b.score - a.score);
            scoreBoard.innerHTML = sorted.map(s => `
                <div class="flex justify-between items-center p-3 rounded-xl ${s.id === 'YOU' ? 'bg-emerald-500/20 border-2 border-emerald-400' : 'bg-slate-800/40 border-2 border-slate-700'}">
                    <div class="flex items-center gap-3">
                        <div class="w-4 h-4 rounded-sm" style="background:${s.color}; box-shadow: 0 0 10px ${s.color};"></div>
                        <span class="font-bold text-xl ${s.id === 'YOU' ? 'text-emerald-400' : 'text-slate-300'}">${s.id}</span>
                    </div>
                    <span class="font-mono text-2xl text-white">${s.score}</span>
                </div>`).join('');
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    </script>
</body>

</html>
